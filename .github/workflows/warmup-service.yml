name: Warmup Service

on:
  schedule:
    - cron: '*/8 * * * *'
  workflow_dispatch:

permissions: {}

jobs:
  warmup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      WARMUP_URL: ${{ secrets.WARMUP_URL }}
      INTERNAL_API_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}
    steps:
      - name: Ping warmup endpoint
        shell: bash
        run: |
          set -euo pipefail
          : "${WARMUP_URL:?Missing WARMUP_URL secret}"
          : "${INTERNAL_API_TOKEN:?Missing INTERNAL_API_TOKEN secret}"

          curl \
            --fail \
            --silent \
            --show-error \
            --retry 3 \
            --retry-delay 5 \
            --retry-max-time 40 \
            --max-time 120 \
            -H "Authorization: Bearer $INTERNAL_API_TOKEN" \
            "$WARMUP_URL"
